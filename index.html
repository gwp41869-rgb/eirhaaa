<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delayed Fireworks: I LOVE YOU EIRHA</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let fireworks = [];

class Firework {
    constructor(x, delay=0) {
        this.x = x;
        this.y = canvas.height;
        this.targetY = Math.random() * canvas.height / 2;
        this.speed = 5;
        this.exploded = false;
        this.color = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
        this.delay = delay;
        this.started = false;
        setTimeout(()=> this.started = true, this.delay);
    }
    update() {
        if(!this.started) return;
        if(this.y > this.targetY && !this.exploded) {
            this.y -= this.speed;
        } else if(!this.exploded) {
            this.explode();
            this.exploded = true;
        }
    }
    explode() {
        const colors = ['#ff0000','#ff7f00','#ffff00','#00ff00','#0000ff','#4b0082','#8f00ff'];
        const text = "I LOVE YOU EIRHA";
        for(let i=0;i<200;i++){
            const color = colors[Math.floor(Math.random()*colors.length)];
            particles.push(new Particle(this.x, this.y, color));
        }
        // add text in random RGB
        particles.push(new Particle(this.x-180, this.y, `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`, text));
    }
    draw() {
        if(!this.started) return;
        if(!this.exploded){
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
}

class Particle {
    constructor(x, y, color, text=false) {
        this.x = x;
        this.y = y;
        this.radius = 2;
        this.color = color;
        this.text = text;
        this.speed = Math.random() * 6 + 2;
        this.angle = Math.random() * Math.PI*2;
        this.alpha = 1;
        this.decay = Math.random()*0.02 + 0.01;
    }
    update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.alpha -= this.decay;
    }
    draw() {
        if(this.text){
            ctx.font = 'bold 30px Arial';
            ctx.fillStyle = this.color;
            ctx.fillText(this.text, this.x, this.y);
        } else {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
}

// Launch 3–4 fireworks with slight delays every 2 seconds
const launchInterval = setInterval(() => {
    const count = Math.floor(Math.random()*2)+3; // 3 or 4 fireworks
    for(let i=0;i<count;i++){
        const x = Math.random() * canvas.width;
        const delay = i * 400; // 0ms, 400ms, 800ms, etc.
        fireworks.push(new Firework(x, delay));
    }
}, 2000);

// Stop launching after 10 seconds
setTimeout(() => clearInterval(launchInterval), 10000);

function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    fireworks.forEach((f,i)=>{
        f.update();
        f.draw();
        if(f.exploded) fireworks.splice(i,1);
    });

    particles.forEach((p,i)=>{
        p.update();
        p.draw();
        if(p.alpha <= 0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
